version: "3.8"

services:
  # ── Backend API ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: slingshot-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - DEBUG=false
      - ALLOWED_ORIGINS=["http://localhost:3000","http://localhost:3001","${USER_APP_URL:-http://localhost:3000}","${ADMIN_APP_URL:-http://localhost:3001}"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── User-facing Frontend ─────────────────────────────────────
  frontend-user:
    build:
      context: ./frontend-user
      dockerfile: Dockerfile
      args:
        VITE_BACKEND_URL: ${BACKEND_URL:-http://localhost:8000}
        VITE_WS_URL: ${WS_URL:-ws://localhost:8000}
    container_name: slingshot-user
    restart: unless-stopped
    ports:
      - "${USER_PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_healthy

  # ── Admin Dashboard ──────────────────────────────────────────
  frontend-admin:
    build:
      context: ./frontend-admin
      dockerfile: Dockerfile
      args:
        VITE_BACKEND_URL: ${BACKEND_URL:-http://localhost:8000}
        VITE_WS_URL: ${WS_URL:-ws://localhost:8000}
    container_name: slingshot-admin
    restart: unless-stopped
    ports:
      - "${ADMIN_PORT:-3001}:80"
    depends_on:
      backend:
        condition: service_healthy
