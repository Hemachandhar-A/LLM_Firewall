[pytest]
# Pytest configuration for the AMD project

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for test categorization
markers =
    integration: marks tests as integration tests requiring external services (Groq API, Ollama)
    unit: marks tests as unit tests
    slow: marks tests as slow running
    security: marks tests as security-related tests

# Skip integration tests by default in CI
addopts = -m "not integration" --tb=short

# Test output
testpaths = tests

# Coverage options (if using pytest-cov)
# addopts = --cov=backend --cov-report=html
